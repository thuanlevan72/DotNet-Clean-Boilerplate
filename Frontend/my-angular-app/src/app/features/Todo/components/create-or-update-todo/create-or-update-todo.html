<div
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
  (click)="onOverlayClick()"
>
  <div
    class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl p-6 relative animate-fadeIn"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      (click)="onCancel()"
      class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 text-xl transition-colors"
    >
      ✕
    </button>

    <h2 class="text-2xl font-bold mb-6 text-gray-800">
      {{ isEditMode() ? 'Update Todo' : 'Create Todo' }}
    </h2>

    <form [formGroup]="todoForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
          Title {{ this.stateTodo }} <span class="text-red-500">*</span>
        </label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="Enter todo title"
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
        />

        @if (todoForm.get('title')?.invalid && todoForm.get('title')?.touched) {
          <div class="text-red-500 text-sm mt-1">Vui lòng nhập tiêu đề (Title is required).</div>
        }
      </div>

      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-1"
          >Description</label
        >
        <textarea
          id="description"
          formControlName="description"
          rows="3"
          placeholder="Enter detailed description..."
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
        ></textarea>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div>
          <label for="priority" class="block text-sm font-medium text-gray-700 mb-1"
            >Priority</label
          >
          <select
            id="priority"
            formControlName="priority"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white"
          >
            <option [value]="0">None</option>
            <option [value]="1">Low</option>
            <option [value]="2">Medium</option>
            <option [value]="3">High</option>
            <option [value]="4">Urgent</option>
          </select>
        </div>

        <div>
          <label for="categoryId" class="block text-sm font-medium text-gray-700 mb-1"
            >Category</label
          >
          <select
            id="categoryId"
            formControlName="categoryId"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white"
          >
            @for (cat of categories; track cat.id) {
              <option [value]="cat.id">{{ cat.name }}</option>
            }
          </select>
        </div>

        <div>
          <label for="dueDate" class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
          <input
            id="dueDate"
            type="datetime-local"
            defaultValue="2024-"
            formControlName="dueDate"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Tags</label>
        <div class="flex flex-wrap gap-4">
          @if (availableTags.length === 0) {
            <span class="text-sm text-gray-500 italic">Đang tải tags...</span>
          }

          @for (tag of availableTags; track tag.id) {
            <label class="flex items-center gap-2 cursor-pointer group">
              <input
                type="checkbox"
                [checked]="isTagChecked(tag.id)"
                (change)="onTagChange($event, tag.id)"
                class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer"
              />
              <span class="text-sm text-gray-700 group-hover:text-blue-600 transition-colors">{{
                tag.name
              }}</span>
            </label>
          }
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-6 mt-2 border-t border-gray-100">
        <button
          type="button"
          (click)="onCancel()"
          class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition-colors"
        >
          Cancel
        </button>

        <button
          type="submit"
          [disabled]="todoForm.invalid"
          class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Save
        </button>
      </div>
    </form>
  </div>
</div>
