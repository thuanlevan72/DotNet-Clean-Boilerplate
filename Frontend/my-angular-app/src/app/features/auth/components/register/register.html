<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Đăng ký</h2>

    <form [formGroup]="loginRegisterForm" (ngSubmit)="submit()">
      <app-custom-input
        labelText="Họ và tên"
        inputType="text"
        placeholderText="Nhập họ và tên"
        [control]="getControl('fullname')"
      >
      </app-custom-input>
      <app-custom-input
        labelText="Tài khoản Email"
        inputType="text"
        placeholderText="nhap@email.com"
        [control]="getControl('email')"
      >
      </app-custom-input>

      <app-custom-input
        labelText="Mật khẩu"
        inputType="password"
        placeholderText="••••••••"
        [control]="getControl('password')"
      >
      </app-custom-input>

      <button
        type="submit"
        class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:ring-4 focus:ring-blue-300 transition duration-300"
      >
        Đăng nhập
      </button>
    </form>
    <div class="p-2">
      <a routerLink="/login" class="text-gray-600 hover:text-blue-800"
        >Đã có tài khoản? Đăng nhập ngay</a
      >
    </div>
  </div>
</div>
