version: '3.8'

services:
  # 1. DATABASE (Kho lưu trữ chính)
  db:
    image: postgres:16-alpine
    container_name: todo_postgres
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. CACHE (Bộ nhớ tạm & Bảo vệ)
  redis:
    image: redis:7-alpine
    container_name: todo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 3. MESSAGE BROKER (Bưu điện truyền tin)
  kafka:
    image: apache/kafka:3.7.0
    container_name: todo_kafka
    user: "root" # <--- THÊM ĐÚNG DÒNG NÀY VÀO ĐÂY
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS:  PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m" # Tối ưu RAM
    volumes:
      - kafka_data:/tmp/kafka-logs

  # 4. KAFKA UI (Giao diện xem bưu điện)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: todo_kafka_ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=LocalKafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - JAVA_OPTS=-Xmx256m -Xms256m # Tối ưu RAM
    depends_on:
      - kafka

  # 5. DB MANAGER (Giao diện quản lý Database)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: todo_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

  # 6. CENTRALIZED LOGGING (Hệ thống ghi nhận lỗi)
  seq:
    image: datalust/seq:latest
    container_name: todo_seq
    ports:
      - "5341:80" # Cổng để API bắn log vào
      - "5342:80" # Đổi cổng giao diện Web sang 5342 (để không đụng hàng)
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_SYSTEMRAMTARGET=0.5
      - SEQ_FIRSTRUN_ADMINPASSWORD=AdminPassword123!@#
    volumes:
      - seq_data:/data

  # 7. BACKEND API (.NET Core của bạn)
  # api:
  #   build:
  #     context: ./Backend/TodoApi
  #     dockerfile: Dockerfile
  #   container_name: todo_api
  #   ports:
  #     - "5000:8080"
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=Development
  #     - ASPNETCORE_URLS=http://+:8080
  #     - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=todo_db;Username=postgres;Password=your_password
  #     - ConnectionStrings__RedisConnection=redis:6379
  #     - Kafka__BootstrapServers=kafka:9092
  #     - Serilog__WriteTo__1__Args__serverUrl=http://seq:80 # Gửi log vào cổng nội bộ của Seq
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #     kafka:
  #       condition: service_started
  #   command: ["sh", "-c", "dotnet ef database update && dotnet TodoApi.dll"]

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  seq_data: